baseURL: "https://blackdzs.github.io/"
title: DIZS' Blog
# paginate: 5
pagination:
  pagerSize: 5
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]


minify:
  disableXML: true
  minifyOutput: true

services:
  disqus:
    shortname: your-disqus-shortname

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: ExampleSite
  description: "ExampleSite description"
  keywords: [Blog, AI, AIGC, RAG, Agent, Langchain, Langflow, AI应用开发]
  author: Me
  # author: ["Me", "You"] # multiple authors
  images: ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "<link / abs url>"
    favicon16x16: "<link / abs url>"
    favicon32x32: "<link / abs url>"
    apple_touch_icon: "<link / abs url>"
    safari_pinned_tab: "<link / abs url>"

  mainsections:
    - page
    - post
    - archive
    - search


  label:
    text: "DIZS' Blog"
    icon: /apple-touch-icon.png
    iconHeight: 35

  # profile-mode
  profileMode:
    enabled: true # needs to be explicitly set
    title: DIZS' Blog
    subtitle: "你好 \U0001F44B! 欢迎来到我的博客 \n\n 在这里我会分享AI前沿技术和行业应用，你也可以关注我的公众号《AI 应用开发》"
    imageUrl: "/images/head-icon.png"
    imageWidth: 120
    imageHeight: 120
    imageTitle: my image
    buttons:
      - name: 文章
        url: posts
      - name: 标签
        url: tags

  # home-info mode
  homeInfoParams:
    Title: "你好 \U0001F44B"
    Content: 欢迎来到我的博客，在这里我会分享AI前沿技术和行业应用，你也可以关注我的公众号《AI 应用开发》

  socialIcons:
    - name: email
      url: "mailto:1980694906@qq.com"
    - name: github
      url: "https://github.com/blackDZS"
    - name: zhihu
      url: "https://www.zhihu.com/people/di-zhen-sheng"

  analytics:
    google:
      SiteVerificationTag: "tvekrz6yFhugJH5VxhQKtqb8Y8b_50U3OCHZd1ISU-Q"
    bing:
      SiteVerificationTag: "XYZabc"
    yandex:
      SiteVerificationTag: "XYZabc"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  editPost:
    URL: "https://github.com/<path_to_repo>/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: false # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: categories
      name: 分类
      url: categories/
      weight: 10
    - identifier: tags
      name: 标签
      url: tags/
      weight: 20
    - identifier: archive
      name: 归档
      url: archives
      weight: 30
    - identifier: about
      name: 关于我
      url: about/about-me
      weight: 40
    - identifier: search
      name: 搜索
      url: search/
      weight: 50
# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true

markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai